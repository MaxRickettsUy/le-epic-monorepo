# Postgres + app stack for le-epic-backend.
# - Pins a specific Postgres version and persists data in a named volume.
# - Healthcheck gates the app start until Postgres is accepting connections.
# - Secrets live in an optional .env file (see .env.example).

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  hc_archives_back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hc_archives_back
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8000:5000"
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
